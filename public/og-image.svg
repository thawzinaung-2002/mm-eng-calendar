<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <!-- Gold glow gradient -->
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0" />
    </radialGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.07" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02" />
    </linearGradient>
    <!-- Icon gradient -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24" />
      <stop offset="100%" style="stop-color:#d97706" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Gold ambient glow center -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#goldGlow)"/>

  <!-- Decorative circles (background) -->
  <circle cx="100" cy="100" r="120" fill="none" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.12"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.08"/>
  <circle cx="1100" cy="530" r="150" fill="none" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.12"/>
  <circle cx="1100" cy="530" r="100" fill="none" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.08"/>

  <!-- Stars -->
  <circle cx="200" cy="50" r="2" fill="#f59e0b" opacity="0.6"/>
  <circle cx="400" cy="80" r="1.5" fill="#f59e0b" opacity="0.4"/>
  <circle cx="900" cy="40" r="2" fill="#f59e0b" opacity="0.5"/>
  <circle cx="1050" cy="90" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="150" cy="400" r="2" fill="#ffffff" opacity="0.2"/>
  <circle cx="1100" cy="200" r="2.5" fill="#f59e0b" opacity="0.5"/>
  <circle cx="50" cy="300" r="1.5" fill="#f59e0b" opacity="0.3"/>
  <circle cx="1150" cy="350" r="2" fill="#ffffff" opacity="0.25"/>

  <!-- Glassmorphism main card -->
  <rect x="80" y="100" width="1040" height="430" rx="24" ry="24"
        fill="url(#cardGrad)" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Top gold accent line -->
  <rect x="80" y="100" width="1040" height="3" rx="2" fill="url(#iconGrad)" opacity="0.8"/>

  <!-- Calendar Icon Background Circle -->
  <circle cx="220" cy="315" r="90" fill="#f59e0b" fill-opacity="0.1" filter="url(#softGlow)"/>
  <circle cx="220" cy="315" r="72" fill="#1e293b" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Calendar Icon (SVG drawn calendar) -->
  <rect x="172" y="283" width="96" height="80" rx="8" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <rect x="172" y="283" width="96" height="24" rx="8" fill="#f59e0b" opacity="0.85"/>
  <!-- Calendar dots hooks -->
  <rect x="192" y="276" width="6" height="16" rx="3" fill="#f59e0b"/>
  <rect x="242" y="276" width="6" height="16" rx="3" fill="#f59e0b"/>
  <!-- Calendar grid dots -->
  <rect x="182" y="318" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.7"/>
  <rect x="198" y="318" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.7"/>
  <rect x="214" y="318" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.7"/>
  <rect x="230" y="318" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.7"/>
  <rect x="246" y="318" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.4"/>
  <rect x="182" y="334" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.5"/>
  <rect x="198" y="334" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.5"/>
  <rect x="214" y="334" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.9"/>
  <rect x="230" y="334" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.5"/>
  <rect x="246" y="334" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.5"/>
  <rect x="182" y="350" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.3"/>
  <rect x="198" y="350" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.3"/>

  <!-- Divider line -->
  <line x1="340" y1="160" x2="340" y2="460" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Main Title -->
  <text x="380" y="240" font-family="Georgia, serif" font-size="52" font-weight="700"
        fill="#ffffff" letter-spacing="-1">Myanmar-English</text>
  <text x="380" y="300" font-family="Georgia, serif" font-size="52" font-weight="700"
        fill="url(#iconGrad)" letter-spacing="-1">Calendar Converter</text>

  <!-- Myanmar script subtitle -->
  <text x="380" y="356" font-family="'Noto Sans Myanmar', sans-serif" font-size="28"
        fill="#f59e0b" opacity="0.9">မြန်မာ-အင်္ဂလိပ် ပြက္ခဒိန်</text>

  <!-- Divider -->
  <rect x="380" y="378" width="640" height="2" rx="1" fill="#f59e0b" opacity="0.2"/>

  <!-- Feature badges -->
  <!-- Badge 1 -->
  <rect x="380" y="400" width="180" height="36" rx="18" fill="#f59e0b" fill-opacity="0.12"
        stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="470" y="423" font-family="Arial, sans-serif" font-size="14" fill="#f59e0b"
        text-anchor="middle" font-weight="600">📅 Date Converter</text>

  <!-- Badge 2 -->
  <rect x="572" y="400" width="180" height="36" rx="18" fill="#f59e0b" fill-opacity="0.12"
        stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="662" y="423" font-family="Arial, sans-serif" font-size="14" fill="#f59e0b"
        text-anchor="middle" font-weight="600">🌙 Lunar Calendar</text>

  <!-- Badge 3 -->
  <rect x="764" y="400" width="210" height="36" rx="18" fill="#f59e0b" fill-opacity="0.12"
        stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="869" y="423" font-family="Arial, sans-serif" font-size="14" fill="#f59e0b"
        text-anchor="middle" font-weight="600">✨ Auspicious Days</text>

  <!-- URL label at bottom -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="18"
        fill="#94a3b8" text-anchor="middle">mm-eng-calendar.vercel.app</text>

  <!-- Bottom gold decorative line -->
  <rect x="80" y="527" width="1040" height="3" rx="2" fill="url(#iconGrad)" opacity="0.5"/>
</svg>
