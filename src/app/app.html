<div class="min-h-screen flex flex-col">
  <!-- Top Navigation -->
  <nav class="glass sticky top-0 z-50 mx-4 mt-4 mb-8 border-gold/10 overflow-hidden shadow-2xl">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="hidden md:flex w-10 h-10 bg-gold rounded-xl items-center justify-center text-navy font-black shadow-lg shadow-gold/20">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
            <circle cx="12" cy="15" r="1.5"></circle>
          </svg>
        </div>
        <span class="text-lg md:text-xl font-bold gold-text tracking-tight">Myanmar-English Calendar</span>
      </div>

      <!-- Desktop Menu -->
      <div class="hidden md:flex items-center gap-2">
        @for (link of navLinks; track link.path) {
          <a [routerLink]="link.path"
             routerLinkActive="bg-gold/10 text-gold border-gold/20"
             [routerLinkActiveOptions]="{exact: true}"
             class="px-5 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-white/5 transition-all border border-transparent">
            {{ link.label }}
          </a>
        }
      </div>

      <!-- Mobile Menu Toggle -->
      <button class="md:hidden p-2 text-gold" (click)="toggleMenu()">
        <span class="text-2xl">{{ isMobileMenuOpen() ? '✕' : '☰' }}</span>
      </button>
    </div>

    <!-- Mobile Menu -->
    @if (isMobileMenuOpen()) {
      <div class="md:hidden border-t border-gold/10 p-4 flex flex-col gap-2 animate-in slide-in-from-top-4 duration-300">
        @for (link of navLinks; track link.path) {
          <a [routerLink]="link.path"
             (click)="isMobileMenuOpen.set(false)"
             routerLinkActive="bg-gold/10 text-gold"
             [routerLinkActiveOptions]="{exact: true}"
             class="px-4 py-3 rounded-xl text-base font-medium text-slate-300">
            {{ link.icon }} {{ link.label }}
          </a>
        }
      </div>
    }
  </nav>

  <!-- Main Content -->
  <main class="flex-grow pb-24">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer -->
  <footer class="py-12 border-t border-gold/5 bg-navy/50 text-center">
    <p class="text-slate-500 text-sm">© 2026 Myanmar-English Calendar. Built with ❤️ for Heritage.</p>
  </footer>
</div>
