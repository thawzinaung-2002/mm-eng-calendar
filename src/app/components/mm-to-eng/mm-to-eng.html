<div class="container mx-auto px-2 sm:px-4 py-2 sm:py-4 max-w-2xl">
  <div class="card mb-4 sm:mb-8">
    <h1 class="text-xl sm:text-2xl md:text-3xl font-bold gold-text mb-4 tracking-tighter sm:tracking-normal truncate text-center md:text-left">Myanmar to English Converter</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-4 sm:mb-8">
      <div class="flex flex-col gap-2">
        <label class="text-xs text-slate-400 font-bold uppercase">မြန်မာသက္ကရာဇ်</label>
        <input type="number" 
               [ngModel]="mmYear()"
               (ngModelChange)="mmYear.set($event)"
               class="bg-navy-light border border-slate-700 rounded-lg p-3 text-white focus:border-gold outline-none">
      </div>
      
      <div class="flex flex-col gap-2">
        <label class="text-xs text-slate-400 font-bold uppercase">မြန်မာလ</label>
        <select [ngModel]="mmMonth()"
                (ngModelChange)="mmMonth.set($event)"
                class="bg-navy-light border border-slate-700 rounded-lg p-3 text-white focus:border-gold outline-none">
          @for (m of allMonths(); track m.id) {
            <option [ngValue]="m.id">{{ m.name_my }}</option>
          }
        </select>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-xs text-slate-400 font-bold uppercase">ရက် (၁-၁၅)</label>
        <input type="number" 
               [ngModel]="mmDay()"
               (ngModelChange)="mmDay.set($event)"
               min="1" max="15"
               class="bg-navy-light border border-slate-700 rounded-lg p-3 text-white focus:border-gold outline-none">
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-xs text-slate-400 font-bold uppercase">လဆန်း/လဆုတ်</label>
        <select [ngModel]="mmPhase()"
                (ngModelChange)="mmPhase.set($event)"
                class="bg-navy-light border border-slate-700 rounded-lg p-3 text-white focus:border-gold outline-none">
          @for (p of phases; track p.id) {
            <option [ngValue]="p.id">{{ p.name_my }}</option>
          }
        </select>
      </div>
    </div>

    @if (!isYearValid()) {
      <div class="bg-amber-500/10 border border-amber-500/30 rounded-2xl p-6 text-center animate-in fade-in duration-300">
        <div class="text-3xl mb-2">⚠️</div>
        <p class="text-amber-500 font-medium tracking-wide">Please enter a full 4-digit year (e.g., 1387).</p>
      </div>
    } @else if (engDate(); as date) {
      <div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
        <!-- English Date Result -->
        @if (mmDateTime(); as mmDate) {
          <div class="bg-navy rounded-3xl p-6 mb-8 border border-white/5 shadow-2xl overflow-hidden relative group">
            <div class="absolute inset-0 bg-gradient-to-br from-gold/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
            
            <div class="relative z-10 flex flex-col items-center text-center">
              <span class="text-slate-400 text-xs uppercase tracking-[0.2em] mb-4 font-bold">English Date</span>
              <div class="text-3xl md:text-5xl font-black text-white mb-2 tracking-tight">
                {{ date | date:'EEEE, MMMM d, y' }}
              </div>
            </div>
          </div>
        }

        <!-- Zodiac Sign Result -->
        @if (mmDateTime(); as mmDate) {
          <div class="bg-navy/50 rounded-3xl p-6 border border-white/5 flex flex-col items-center text-center animate-in fade-in slide-in-from-bottom-2 duration-700 delay-150">
            <span class="text-slate-500 text-xs uppercase tracking-[0.2em] mb-3 font-bold">Zodiac Sign</span>
            <span class="text-3xl font-black gold-text tracking-wide">{{ mmDate.rasi }}</span>
          </div>
        }
      </div>
    }
  </div>
</div>
